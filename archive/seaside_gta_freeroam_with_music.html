<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Top-down open-world game with music and sound effects: walk, drive a car, and pilot a boat around a seaside town collecting coins and stars.</h2>
<div style="border-radius:12px;overflow:hidden;border:0.5px solid var(--border);position:relative;">
  <canvas id="gta" width="680" height="430" style="display:block;width:100%;height:auto;touch-action:none;"></canvas>
</div>
<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;">
  <button data-k="left" class="pad" style="width:52px;"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
  <button data-k="right" class="pad" style="width:52px;"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  <button data-k="up" class="pad" style="width:64px;">Gas</button>
  <button data-k="down" class="pad" style="width:64px;">Brake</button>
  <button data-k="action" class="pad" style="width:110px;">Enter / exit</button>
  <button id="mute" style="width:46px;" aria-label="Toggle sound"><i class="ti ti-volume" aria-hidden="true" id="muteIcon"></i></button>
  <span style="font-size:13px;color:var(--text-secondary);">arrows / WASD + E · sound starts on first input</span>
</div>
<script>
const cv = document.getElementById('gta');
const ctx = cv.getContext('2d');
const VW = 680, VH = 430, WW = 2000, WH = 1400;
let t = 0;

const p = {x:1150, y:760, a:-Math.PI/2, spd:0, mode:'foot'};
const car = {x:1160, y:640, a:-Math.PI/2, spd:0};
const boat = {x:690, y:700, a:Math.PI, spd:0};
let score = 0, msg = '', msgT = 0;

const coins = [];
for(let i=0;i<12;i++) coins.push({x:1050+Math.random()*850, y:220+Math.random()*1050, got:false});
const stars = [];
for(let i=0;i<10;i++) stars.push({x:80+Math.random()*720, y:100+Math.random()*1200, got:false, ph:Math.random()*6});

const bldgs = [
  [1300,380,180,120,'#C97B5A'],[1300,560,140,100,'#7BA8C9'],[1550,380,150,160,'#D9A45B'],
  [1300,860,200,120,'#9C8FBF'],[1560,900,160,140,'#C97B5A'],[1300,1020,130,90,'#8FBF9C'],
  [1900,300,70,300,'#B0A08C'],[1900,700,70,340,'#B0A08C']
];
const palms = [[1000,300],[1010,520],[995,880],[1005,1120],[1240,180],[1700,1280],[1150,1330]];

function terrain(x,y){
  if(x>=740 && x<=990 && y>=670 && y<=735) return 'dock';
  if(x<900) return 'water';
  if(x<990) return 'beach';
  return 'land';
}
function onRoad(x,y){
  const out = x>1080 && x<1880 && y>150 && y<1260;
  const inn = x>1250 && x<1710 && y>330 && y<1080;
  return out && !inn;
}

let AC=null, master, musicGain, sfxGain, engOsc, engGain, engFilter, muted=false, bumpCD=0;
function initAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.8; master.connect(AC.destination);
  musicGain = AC.createGain(); musicGain.gain.value = 0.3; musicGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.7; sfxGain.connect(master);
  const len = AC.sampleRate*2, buf = AC.createBuffer(1,len,AC.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const noise = AC.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const nf = AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=380;
  const ng = AC.createGain(); ng.gain.value=0.05;
  const lfo = AC.createOscillator(); lfo.frequency.value=0.14;
  const lg = AC.createGain(); lg.gain.value=0.03;
  lfo.connect(lg); lg.connect(ng.gain);
  noise.connect(nf); nf.connect(ng); ng.connect(master);
  noise.start(); lfo.start();
  engOsc = AC.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=60;
  engFilter = AC.createBiquadFilter(); engFilter.type='lowpass'; engFilter.frequency.value=320;
  engGain = AC.createGain(); engGain.gain.value=0;
  engOsc.connect(engFilter); engFilter.connect(engGain); engGain.connect(master);
  engOsc.start();
  nextBar = AC.currentTime + 0.1;
  setInterval(scheduleMusic, 200);
}
function note(f,t0,dur,type,vol,dest){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(vol,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(dest); o.start(t0); o.stop(t0+dur+0.05);
}
const mel = [440,0,523,587, 659,0,587,523, 440,392,0,440, 523,659,587,0,
             392,0,440,523, 587,0,523,440, 392,330,0,392, 440,0,0,0];
const bass = [110,110,131,131, 98,98,110,110, 87,87,98,98, 110,110,131,110];
let nextBar = 0;
function scheduleMusic(){
  if(!AC) return;
  const e = 0.31;
  while(nextBar < AC.currentTime + 0.6){
    const bt = nextBar;
    mel.forEach((f,i)=>{ if(f) note(f, bt+i*e, 0.34, 'triangle', 0.16, musicGain); });
    bass.forEach((f,i)=>{ note(f, bt+i*e*2, 0.55, 'sine', 0.2, musicGain); });
    for(let i=0;i<16;i++) if(i%4===2) note(2400+Math.random()*400, bt+i*e*2+0.02, 0.06, 'square', 0.03, musicGain);
    nextBar += e*32;
  }
}
function sfxCoin(){ if(!AC) return; const n=AC.currentTime; note(988,n,0.1,'square',0.22,sfxGain); note(1319,n+0.07,0.16,'square',0.22,sfxGain); }
function sfxStar(){ if(!AC) return; const n=AC.currentTime; [659,880,1109,1319].forEach((f,i)=> note(f,n+i*0.07,0.18,'triangle',0.24,sfxGain)); }
function sfxEnter(){ if(!AC) return; const n=AC.currentTime; note(140,n,0.15,'sine',0.35,sfxGain); note(220,n+0.06,0.12,'sine',0.22,sfxGain); }
function sfxExit(){ if(!AC) return; const n=AC.currentTime; note(220,n,0.12,'sine',0.25,sfxGain); note(140,n+0.06,0.15,'sine',0.3,sfxGain); }
function sfxBump(){
  if(!AC || bumpCD>0) return; bumpCD = 0.3;
  const n=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(120,n); o.frequency.exponentialRampToValueAtTime(40,n+0.15);
  g.gain.setValueAtTime(0.3,n); g.gain.exponentialRampToValueAtTime(0.001,n+0.18);
  o.connect(g); g.connect(sfxGain); o.start(n); o.stop(n+0.2);
}
document.getElementById('mute').addEventListener('click', ()=>{
  initAudio();
  muted = !muted;
  if(master) master.gain.setTargetAtTime(muted?0:0.8, AC.currentTime, 0.05);
  document.getElementById('muteIcon').className = muted ? 'ti ti-volume-off' : 'ti ti-volume';
});

const keys = {};
const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right',e:'action',E:'action',Enter:'action'};
addEventListener('keydown', ev=>{ const k=map[ev.key]; if(k){ initAudio(); if(k==='action'&&!keys[k]) doAction(); keys[k]=true; ev.preventDefault(); }});
addEventListener('keyup', ev=>{ const k=map[ev.key]; if(k) keys[k]=false; });
cv.addEventListener('pointerdown', initAudio);
document.querySelectorAll('.pad').forEach(b=>{
  const k = b.dataset.k;
  b.addEventListener('pointerdown', ev=>{ ev.preventDefault(); initAudio(); if(k==='action') doAction(); else keys[k]=true; });
  b.addEventListener('pointerup', ()=> keys[k]=false);
  b.addEventListener('pointercancel', ()=> keys[k]=false);
  b.addEventListener('pointerleave', ()=> keys[k]=false);
});

function say(s){ msg = s; msgT = 2.5; }

function doAction(){
  if(p.mode==='foot'){
    if(Math.hypot(p.x-car.x,p.y-car.y)<55){ p.mode='car'; sfxEnter(); say('Driving the car'); }
    else if(Math.hypot(p.x-boat.x,p.y-boat.y)<70){ p.mode='boat'; sfxEnter(); say('Aboard the boat'); }
  } else if(p.mode==='car'){
    car.spd=0; p.mode='foot'; sfxExit();
    p.x=car.x+Math.cos(car.a+1.57)*40; p.y=car.y+Math.sin(car.a+1.57)*40;
    if(terrain(p.x,p.y)==='water'){ p.x=car.x-Math.cos(car.a+1.57)*40; p.y=car.y-Math.sin(car.a+1.57)*40; }
    say('On foot');
  } else if(p.mode==='boat'){
    if(Math.hypot(boat.x-865,boat.y-702)<160){
      boat.spd=0; p.mode='foot'; sfxExit(); p.x=880; p.y=702; say('Stepped onto the pier');
    } else say('Get closer to the pier to disembark');
  }
}

function drive(v, accel, maxF, maxR, turn, drag, allowed){
  if(keys.up) v.spd += accel;
  if(keys.down) v.spd -= accel*0.8;
  v.spd = Math.max(-maxR, Math.min(maxF, v.spd));
  v.spd *= drag;
  const steer = (keys.left?-1:0)+(keys.right?1:0);
  v.a += steer * turn * Math.min(1, Math.abs(v.spd)/1.5) * Math.sign(v.spd||1);
  const nx = v.x + Math.cos(v.a)*v.spd;
  const ny = v.y + Math.sin(v.a)*v.spd;
  if(allowed(terrain(nx,ny)) && nx>20 && nx<WW-20 && ny>20 && ny<WH-20){ v.x=nx; v.y=ny; }
  else { if(Math.abs(v.spd)>1) sfxBump(); v.spd *= -0.3; }
}

function update(){
  t += 0.016;
  if(msgT>0) msgT -= 0.016;
  if(bumpCD>0) bumpCD -= 0.016;

  if(p.mode==='foot'){
    let dx=(keys.right?1:0)-(keys.left?1:0), dy=(keys.down?1:0)-(keys.up?1:0);
    if(dx||dy){
      const l=Math.hypot(dx,dy); dx/=l; dy/=l;
      p.a = Math.atan2(dy,dx);
      const nx=p.x+dx*2.4, ny=p.y+dy*2.4;
      const tt=terrain(nx,ny);
      if(tt!=='water' && nx>20&&nx<WW-20&&ny>20&&ny<WH-20){ p.x=nx; p.y=ny; }
    }
  } else if(p.mode==='car'){
    const road = onRoad(car.x,car.y);
    drive(car, 0.22, road?7:3.2, 2.5, 0.045, 0.965, tt=> tt==='land'||tt==='beach');
    p.x=car.x; p.y=car.y;
  } else {
    drive(boat, 0.14, 5.5, 1.8, 0.035, 0.985, tt=> tt==='water');
    p.x=boat.x; p.y=boat.y;
  }

  if(AC && engGain){
    let vol=0, freq=60, filt=320;
    if(p.mode==='car'){
      engOsc.type='sawtooth';
      vol = 0.06 + Math.abs(car.spd)*0.012;
      freq = 65 + Math.abs(car.spd)*26;
      filt = 300 + Math.abs(car.spd)*80;
    } else if(p.mode==='boat'){
      engOsc.type='square';
      vol = 0.05 + Math.abs(boat.spd)*0.012;
      freq = 42 + Math.abs(boat.spd)*16;
      filt = 220 + Math.abs(boat.spd)*40;
    }
    engGain.gain.setTargetAtTime(muted?0:vol, AC.currentTime, 0.08);
    engOsc.frequency.setTargetAtTime(freq, AC.currentTime, 0.05);
    engFilter.frequency.setTargetAtTime(filt, AC.currentTime, 0.08);
  }

  for(const c of coins){
    if(!c.got && Math.hypot(c.x-p.x,c.y-p.y)<30 && p.mode!=='boat'){ c.got=true; score+=5; sfxCoin(); }
  }
  for(const s of stars){
    if(!s.got && Math.hypot(s.x-p.x,s.y-p.y)<38 && p.mode==='boat'){ s.got=true; score+=10; sfxStar(); }
  }
  if(coins.every(c=>c.got) && stars.every(s=>s.got) && msgT<=0) say('All collected! Score '+score+' — free roam forever');
}

function draw(){
  const cx = Math.max(0, Math.min(WW-VW, p.x-VW/2));
  const cy = Math.max(0, Math.min(WH-VH, p.y-VH/2));
  ctx.save();
  ctx.translate(-cx,-cy);

  ctx.fillStyle = '#2E86AB'; ctx.fillRect(0,0,900,WH);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
  for(let y=60; y<WH; y+=90){
    ctx.beginPath();
    for(let x=0;x<=900;x+=20) ctx.lineTo(x, y + Math.sin(x/70 + t*1.5 + y)*6);
    ctx.stroke();
  }
  ctx.fillStyle = '#EFD9A7'; ctx.fillRect(900,0,90,WH);
  ctx.fillStyle = '#8FBF7A'; ctx.fillRect(990,0,WW-990,WH);

  ctx.fillStyle = '#6B6B66';
  ctx.fillRect(1080,150,800,1110);
  ctx.fillStyle = '#8FBF7A';
  ctx.fillRect(1250,330,460,750);
  ctx.strokeStyle = '#F7F3E8'; ctx.lineWidth = 3; ctx.setLineDash([22,18]);
  ctx.strokeRect(1165,240,630,930);
  ctx.setLineDash([]);

  ctx.fillStyle = '#A9743F'; ctx.fillRect(740,670,250,65);
  ctx.strokeStyle = '#7A4E26'; ctx.lineWidth=2;
  for(let x=760;x<990;x+=24){ ctx.beginPath(); ctx.moveTo(x,670); ctx.lineTo(x,735); ctx.stroke(); }

  for(const b of bldgs){
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(b[0]+6,b[1]+6,b[2],b[3]);
    ctx.fillStyle = b[4]; ctx.fillRect(b[0],b[1],b[2],b[3]);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for(let wx=b[0]+14; wx<b[0]+b[2]-14; wx+=30)
      for(let wy=b[1]+14; wy<b[1]+b[3]-14; wy+=30) ctx.fillRect(wx,wy,12,12);
  }
  for(const pl of palms){
    ctx.fillStyle = '#7A4E26'; ctx.beginPath(); ctx.arc(pl[0],pl[1],6,0,7); ctx.fill();
    ctx.fillStyle = '#3B8F5A';
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3 + Math.sin(t+pl[0])*0.08;
      ctx.beginPath(); ctx.ellipse(pl[0]+Math.cos(a)*16, pl[1]+Math.sin(a)*16, 16, 6, a, 0, 7); ctx.fill();
    }
  }

  for(const c of coins){
    if(c.got) continue;
    ctx.fillStyle = '#F9C74F'; ctx.beginPath(); ctx.arc(c.x,c.y,9,0,7); ctx.fill();
    ctx.strokeStyle = '#BA7517'; ctx.lineWidth=2; ctx.stroke();
  }
  for(const s of stars){
    if(s.got) continue;
    const bob = Math.sin(t*2.5+s.ph)*3;
    ctx.save(); ctx.translate(s.x,s.y+bob); ctx.rotate(t*0.8+s.ph);
    ctx.fillStyle = '#F9C74F'; ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=i*2*Math.PI/5-Math.PI/2;
      ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
      const b2=a+Math.PI/5;
      ctx.lineTo(Math.cos(b2)*5.5,Math.sin(b2)*5.5);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  ctx.save(); ctx.translate(boat.x,boat.y); ctx.rotate(boat.a);
  if(p.mode==='boat' && Math.abs(boat.spd)>0.5){
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-30,-8); ctx.lineTo(-60,-16); ctx.moveTo(-30,8); ctx.lineTo(-60,16); ctx.stroke();
  }
  ctx.fillStyle = '#8B4A2B';
  ctx.beginPath(); ctx.moveTo(34,0); ctx.quadraticCurveTo(20,-14,-24,-11);
  ctx.quadraticCurveTo(-32,0,-24,11); ctx.quadraticCurveTo(20,14,34,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#A85C38';
  ctx.beginPath(); ctx.moveTo(24,0); ctx.quadraticCurveTo(14,-8,-18,-6);
  ctx.quadraticCurveTo(-24,0,-18,6); ctx.quadraticCurveTo(14,8,24,0); ctx.closePath(); ctx.fill();
  if(p.mode==='boat'){ ctx.fillStyle='#F4A870'; ctx.beginPath(); ctx.arc(-4,0,5,0,7); ctx.fill(); }
  ctx.restore();

  ctx.save(); ctx.translate(car.x,car.y); ctx.rotate(car.a);
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(-20,-9,42,20);
  ctx.fillStyle = '#D85A30';
  ctx.beginPath(); ctx.roundRect(-22,-11,44,22,6); ctx.fill();
  ctx.fillStyle = '#3A3A38'; ctx.beginPath(); ctx.roundRect(-10,-8,22,16,4); ctx.fill();
  ctx.fillStyle = '#B9D9EA'; ctx.fillRect(8,-7,4,14); ctx.fillRect(-8,-7,3,14);
  ctx.fillStyle = '#FDE9C8'; ctx.fillRect(20,-8,3,4); ctx.fillRect(20,4,3,4);
  ctx.restore();

  if(p.mode==='foot'){
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(0,3,9,6,0,0,7); ctx.fill();
    ctx.fillStyle='#2C5F8A'; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
    ctx.fillStyle='#F4A870'; ctx.beginPath(); ctx.arc(Math.cos(p.a)*3,Math.sin(p.a)*3,4.5,0,7); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  ctx.fillStyle = 'rgba(4,44,83,0.75)';
  ctx.fillRect(10,10,150,54);
  ctx.fillStyle = '#FFFFFF'; ctx.font='500 15px sans-serif';
  ctx.fillText('Score ' + score, 22, 32);
  ctx.font='400 12px sans-serif';
  ctx.fillText(p.mode==='foot'?'On foot':(p.mode==='car'?'In car':'In boat'), 22, 52);

  let hint = '';
  if(p.mode==='foot'){
    if(Math.hypot(p.x-car.x,p.y-car.y)<55) hint='Press E — enter car';
    else if(Math.hypot(p.x-boat.x,p.y-boat.y)<70) hint='Press E — board boat';
  } else if(p.mode==='boat' && Math.hypot(boat.x-865,boat.y-702)<160) hint='Press E — dock at pier';
  else if(p.mode==='car') hint = onRoad(car.x,car.y)?'':'Off-road: slower';
  if(msgT>0) hint = msg;
  if(hint){
    ctx.font='500 14px sans-serif';
    const w = ctx.measureText(hint).width+28;
    ctx.fillStyle='rgba(4,44,83,0.8)'; ctx.fillRect(VW/2-w/2, VH-46, w, 30);
    ctx.fillStyle='#FFFFFF'; ctx.textAlign='center';
    ctx.fillText(hint, VW/2, VH-26); ctx.textAlign='left';
  }

  const ms=0.055;
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(VW-WW*ms-14, 10, WW*ms+8, WH*ms+8);
  const mx=VW-WW*ms-10, my=14;
  ctx.fillStyle='#7FB6D0'; ctx.fillRect(mx,my,900*ms,WH*ms);
  ctx.fillStyle='#EFD9A7'; ctx.fillRect(mx+900*ms,my,90*ms,WH*ms);
  ctx.fillStyle='#A8D19A'; ctx.fillRect(mx+990*ms,my,(WW-990)*ms,WH*ms);
  ctx.fillStyle='#6B6B66'; ctx.fillRect(mx+1080*ms,my+150*ms,800*ms,1110*ms);
  ctx.fillStyle='#A8D19A'; ctx.fillRect(mx+1250*ms,my+330*ms,460*ms,750*ms);
  ctx.fillStyle='#E24B4A'; ctx.beginPath(); ctx.arc(mx+p.x*ms,my+p.y*ms,3,0,7); ctx.fill();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
