<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaside free roam</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --page-bg:#FAF9F5;
  --surface-1:#F5F4EE;
  --surface-2:#FFFFFF;
  --border:rgba(31,30,28,0.14);
  --border-strong:rgba(31,30,28,0.24);
  --text-primary:#1F1E1C;
  --text-secondary:#6B6A66;
  --radius:8px;
}
@media (prefers-color-scheme: dark){
  :root{
    --page-bg:#262624;
    --surface-1:#30302E;
    --surface-2:#393937;
    --border:rgba(250,249,245,0.16);
    --border-strong:rgba(250,249,245,0.28);
    --text-primary:#F5F4EF;
    --text-secondary:#B8B6AF;
  }
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--page-bg);
  color:var(--text-primary);
  font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px;
  line-height:1.7;
  display:flex;
  justify-content:center;
  padding:2.5rem 1rem;
}
main{width:100%;max-width:680px}
h1{font-size:22px;font-weight:500;margin:0 0 1rem}
p.lede{color:var(--text-secondary);font-size:14px;margin:0 0 1.5rem}
.frame{
  border-radius:12px;
  overflow:hidden;
  border:0.5px solid var(--border);
  background:var(--surface-2);
}
canvas{display:block;width:100%;height:auto;touch-action:none}
.controls{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
button{
  font:inherit;
  font-size:14px;
  color:var(--text-primary);
  background:transparent;
  border:0.5px solid var(--border-strong);
  border-radius:var(--radius);
  height:36px;
  padding:0 10px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:background 120ms ease, transform 80ms ease;
  -webkit-user-select:none;user-select:none;
}
button:hover{background:var(--surface-1)}
button:active{transform:scale(0.98)}
button:focus-visible{outline:none;box-shadow:0 0 0 2px var(--page-bg),0 0 0 4px #378ADD}
.hintline{font-size:13px;color:var(--text-secondary)}
.ti{font-size:18px}
</style>
</head>
<body>
<main>
<h1>Seaside free roam</h1>
<p class="lede">Walk the town, drive the car, take the boat out. WASD or arrows to move, E to enter and exit, R for the radio, H for the horn. Sound starts on your first input.</p>
<div class="frame">
  <canvas id="gta" width="680" height="430"></canvas>
</div>
<div class="controls">
  <button data-k="left" class="pad" style="width:50px" aria-label="Steer left"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
  <button data-k="right" class="pad" style="width:50px" aria-label="Steer right"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  <button data-k="up" class="pad" style="width:58px">Gas</button>
  <button data-k="down" class="pad" style="width:58px">Brake</button>
  <button data-k="action" class="pad" style="width:96px">Enter / exit</button>
  <button id="horn" style="width:52px" aria-label="Horn"><i class="ti ti-bell" aria-hidden="true"></i></button>
  <button id="radio" style="width:52px" aria-label="Change radio station"><i class="ti ti-radio" aria-hidden="true"></i></button>
  <button id="mute" style="width:46px" aria-label="Toggle sound"><i class="ti ti-volume" aria-hidden="true" id="muteIcon"></i></button>
  <span class="hintline">WASD/arrows · E enter/exit · R radio · H horn</span>
</div>
</main>
<script>
const cv = document.getElementById('gta');
const ctx = cv.getContext('2d');
const VW = 680, VH = 430, WW = 2000, WH = 1400;
let t = 0;

const p = {x:1150, y:760, a:-Math.PI/2, spd:0, mode:'foot'};
const car = {x:1160, y:640, a:-Math.PI/2, spd:0};
const boat = {x:690, y:700, a:Math.PI, spd:0};
let score = 0, msg = '', msgT = 0;

const coins = [];
for(let i=0;i<12;i++) coins.push({x:1050+Math.random()*850, y:220+Math.random()*1050, got:false});
const stars = [];
for(let i=0;i<10;i++) stars.push({x:80+Math.random()*720, y:100+Math.random()*1200, got:false, ph:Math.random()*6});

const bldgs = [
  [1300,380,180,120,'#C97B5A'],[1300,560,140,100,'#7BA8C9'],[1550,380,150,160,'#D9A45B'],
  [1300,860,200,120,'#9C8FBF'],[1560,900,160,140,'#C97B5A'],[1300,1020,130,90,'#8FBF9C'],
  [1900,300,70,300,'#B0A08C'],[1900,700,70,340,'#B0A08C']
];
const palms = [[1000,300],[1010,520],[995,880],[1005,1120],[1240,180],[1700,1280],[1150,1330]];

function terrain(x,y){
  if(x>=740 && x<=990 && y>=670 && y<=735) return 'dock';
  if(x<900) return 'water';
  if(x<990) return 'beach';
  return 'land';
}
function onRoad(x,y){
  const out = x>1080 && x<1880 && y>150 && y<1260;
  const inn = x>1250 && x<1710 && y>330 && y<1080;
  return out && !inn;
}

let AC=null, master, musicGain, sfxGain, engOsc, engGain, engFilter, noiseBuf, muted=false, bumpCD=0, hornCD=0;
let stationIdx=0, nextBar=0, barCount=0;

const stations = [
  {name:'Wave 84 FM', bpm:106, style:'synthwave', jin:[440,554.37,659.25],
   prog:[
     {b:55.0, arp:[440,523.25,659.25], pad:[220,261.63,329.63]},
     {b:43.65, arp:[349.23,440,523.25], pad:[174.61,220,261.63]},
     {b:65.41, arp:[523.25,659.25,783.99], pad:[261.63,329.63,392]},
     {b:49.0, arp:[392,493.88,587.33], pad:[196,246.94,293.66]}
   ]},
  {name:'Neon Nights', bpm:124, style:'synthwave', jin:[659.25,830.61,987.77],
   prog:[
     {b:82.41, arp:[659.25,783.99,987.77], pad:[329.63,392,493.88]},
     {b:65.41, arp:[523.25,659.25,783.99], pad:[261.63,329.63,392]},
     {b:98.0, arp:[783.99,987.77,1174.66], pad:[392,493.88,587.33]},
     {b:73.42, arp:[587.33,739.99,880], pad:[293.66,369.99,440]}
   ]},
  {name:'Island Breeze', bpm:76, style:'reggae', jin:[392,493.88,587.33],
   prog:[
     {b:55.0, sk:[220,261.63,329.63]},
     {b:73.42, sk:[293.66,349.23,440]},
     {b:82.41, sk:[329.63,392,493.88]},
     {b:55.0, sk:[220,261.63,329.63]}
   ]},
  {name:'Rockline 101', bpm:142, style:'rock', jin:[329.63,392,493.88],
   prog:[{b:82.41},{b:82.41},{b:98.0},{b:110.0}]},
  {name:'Seaside Chill', style:'chill', jin:[523.25,659.25,783.99],
   mel:[440,0,523,587, 659,0,587,523, 440,392,0,440, 523,659,587,0,
        392,0,440,523, 587,0,523,440, 392,330,0,392, 440,0,0,0],
   bass:[110,110,131,131, 98,98,110,110, 87,87,98,98, 110,110,131,110]},
  {name:'Radio off', style:'off', jin:[220]}
];

function initAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.8; master.connect(AC.destination);
  musicGain = AC.createGain(); musicGain.gain.value = 0.28; musicGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.7; sfxGain.connect(master);
  const len = AC.sampleRate*2;
  noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const waves = AC.createBufferSource(); waves.buffer=noiseBuf; waves.loop=true;
  const nf = AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=360;
  const ng = AC.createGain(); ng.gain.value=0.045;
  const lfo = AC.createOscillator(); lfo.frequency.value=0.14;
  const lg = AC.createGain(); lg.gain.value=0.025;
  lfo.connect(lg); lg.connect(ng.gain);
  waves.connect(nf); nf.connect(ng); ng.connect(master);
  waves.start(); lfo.start();
  engOsc = AC.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=60;
  engFilter = AC.createBiquadFilter(); engFilter.type='lowpass'; engFilter.frequency.value=320;
  engGain = AC.createGain(); engGain.gain.value=0;
  engOsc.connect(engFilter); engFilter.connect(engGain); engGain.connect(master);
  engOsc.start();
  nextBar = AC.currentTime + 0.1; barCount = 0;
  setInterval(scheduleMusic, 150);
}

function note(f,t0,dur,type,vol,dest,detune){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=f; if(detune) o.detune.value=detune;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(vol,t0+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(dest); o.start(t0); o.stop(t0+dur+0.05);
}
function kick(t0,v){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(150,t0); o.frequency.exponentialRampToValueAtTime(44,t0+0.12);
  g.gain.setValueAtTime(v||0.5,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.16);
  o.connect(g); g.connect(musicGain); o.start(t0); o.stop(t0+0.18);
}
function snare(t0,v){
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1900; f.Q.value=0.8;
  const g=AC.createGain();
  g.gain.setValueAtTime(v||0.32,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.22);
  s.connect(f); f.connect(g); g.connect(musicGain); s.start(t0); s.stop(t0+0.25);
  note(190,t0,0.08,'triangle',0.15,musicGain);
}
function hat(t0,open,v){
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6500;
  const g=AC.createGain(); const d=open?0.14:0.04;
  g.gain.setValueAtTime(v||(open?0.12:0.09),t0); g.gain.exponentialRampToValueAtTime(0.001,t0+d);
  s.connect(f); f.connect(g); g.connect(musicGain); s.start(t0); s.stop(t0+d+0.02);
}
function staticBurst(t0,dur){
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=2000;
  const g=AC.createGain();
  g.gain.setValueAtTime(0.18,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  s.connect(f); f.connect(g); g.connect(sfxGain); s.start(t0); s.stop(t0+dur+0.02);
}

function scheduleMusic(){
  if(!AC) return;
  const st = stations[stationIdx];
  if(st.style==='off') return;
  while(nextBar < AC.currentTime + 0.9){
    const bt = nextBar;
    if(st.style==='synthwave'){
      const step = 60/st.bpm/2;
      const ch = st.prog[barCount % st.prog.length];
      for(let i=0;i<8;i++){
        const nt = bt + i*step;
        note(ch.b, nt, step*0.85, 'sawtooth', 0.16, musicGain);
        note(ch.b*2, nt, step*0.6, 'square', 0.05, musicGain);
        if(i%2===0) kick(nt);
        if(i===2||i===6) snare(nt);
        hat(nt + step/2, i===7);
        const arpSeq = [0,1,2,1,0,2,1,2];
        note(ch.arp[arpSeq[i]], nt, step*0.9, 'square', 0.07, musicGain);
        if(barCount%2===1 && (i===0||i===4)) note(ch.arp[2]*2, nt, step*1.6, 'sawtooth', 0.045, musicGain, 8);
      }
      ch.pad.forEach(f=>{
        note(f, bt, step*8, 'sawtooth', 0.028, musicGain, -6);
        note(f, bt, step*8, 'sawtooth', 0.028, musicGain, 6);
      });
      nextBar += step*8;
    } else if(st.style==='reggae'){
      const step = 60/st.bpm/2;
      const ch = st.prog[barCount % st.prog.length];
      for(let i=0;i<8;i++){
        const nt = bt + i*step;
        if(i%2===1) ch.sk.forEach(f=> note(f, nt, step*0.45, 'triangle', 0.11, musicGain));
        hat(nt, false, 0.05);
        if(i===4){ kick(nt, 0.55); snare(nt, 0.22); }
        if(i===0||i===3||i===4||i===6) note(ch.b, nt, step*1.4, 'sine', 0.26, musicGain);
      }
      if(barCount%4===3) note(ch.sk[2]*2, bt+6*step, step*1.8, 'triangle', 0.08, musicGain);
      nextBar += step*8;
    } else if(st.style==='rock'){
      const step = 60/st.bpm/2;
      const ch = st.prog[barCount % st.prog.length];
      for(let i=0;i<8;i++){
        const nt = bt + i*step;
        note(ch.b, nt, step*0.7, 'sawtooth', 0.15, musicGain);
        note(ch.b*1.5, nt, step*0.7, 'sawtooth', 0.1, musicGain);
        note(ch.b*2, nt, step*0.7, 'square', 0.05, musicGain, 6);
        if(i===0||i===4||i===7) kick(nt, 0.55);
        if(i===2||i===6) snare(nt, 0.4);
        hat(nt, i===0, 0.08);
      }
      if(barCount%2===1){
        const lead=[ch.b*4, ch.b*4.5, ch.b*6, ch.b*4.5];
        lead.forEach((f,i)=> note(f, bt+(4+i)*step, step*0.9, 'sawtooth', 0.07, musicGain, 5));
      }
      nextBar += step*8;
    } else {
      const e = 0.31;
      st.mel.forEach((f,i)=>{ if(f) note(f, bt+i*e, 0.34, 'triangle', 0.16, musicGain); });
      st.bass.forEach((f,i)=>{ note(f, bt+i*e*2, 0.55, 'sine', 0.2, musicGain); });
      for(let i=0;i<16;i++) if(i%4===2) note(2400+Math.random()*400, bt+i*e*2+0.02, 0.06, 'square', 0.03, musicGain);
      nextBar += e*32;
    }
    barCount++;
  }
}
function switchStation(){
  initAudio();
  stationIdx = (stationIdx+1) % stations.length;
  const st = stations[stationIdx];
  const n = AC.currentTime;
  staticBurst(n, 0.12);
  st.jin.forEach((f,i)=> note(f, n+0.12+i*0.09, 0.22, 'triangle', 0.22, sfxGain));
  nextBar = n + 0.12 + st.jin.length*0.09 + 0.25; barCount = 0;
  say('Radio: ' + st.name);
}
function honk(){
  initAudio();
  if(hornCD>0) return;
  const n = AC.currentTime;
  if(p.mode==='car'){
    hornCD = 0.35;
    [466.16, 587.33].forEach(f=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.12,n); g.gain.setValueAtTime(0.12,n+0.22);
      g.gain.exponentialRampToValueAtTime(0.001,n+0.3);
      o.connect(g); g.connect(sfxGain); o.start(n); o.stop(n+0.32);
    });
    say('Honk!');
  } else if(p.mode==='boat'){
    hornCD = 1.2;
    [110, 138.59].forEach(f=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sawtooth'; o.frequency.value=f;
      const fl=AC.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=500;
      g.gain.setValueAtTime(0.0001,n); g.gain.linearRampToValueAtTime(0.22,n+0.15);
      g.gain.setValueAtTime(0.22,n+0.7); g.gain.exponentialRampToValueAtTime(0.001,n+1.0);
      o.connect(fl); fl.connect(g); g.connect(sfxGain); o.start(n); o.stop(n+1.05);
    });
    say('Foghorn');
  } else {
    hornCD = 0.4;
    note(880,n,0.08,'sine',0.15,sfxGain); note(1100,n+0.09,0.1,'sine',0.15,sfxGain);
    say('Whistle');
  }
}

function sfxCoin(){ if(!AC) return; const n=AC.currentTime; note(988,n,0.1,'square',0.22,sfxGain); note(1319,n+0.07,0.16,'square',0.22,sfxGain); }
function sfxStar(){ if(!AC) return; const n=AC.currentTime; [659,880,1109,1319].forEach((f,i)=> note(f,n+i*0.07,0.18,'triangle',0.24,sfxGain)); }
function sfxEnter(){ if(!AC) return; const n=AC.currentTime; note(140,n,0.15,'sine',0.35,sfxGain); note(220,n+0.06,0.12,'sine',0.22,sfxGain); }
function sfxExit(){ if(!AC) return; const n=AC.currentTime; note(220,n,0.12,'sine',0.25,sfxGain); note(140,n+0.06,0.15,'sine',0.3,sfxGain); }
function sfxBump(){
  if(!AC || bumpCD>0) return; bumpCD = 0.3;
  const n=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(120,n); o.frequency.exponentialRampToValueAtTime(40,n+0.15);
  g.gain.setValueAtTime(0.3,n); g.gain.exponentialRampToValueAtTime(0.001,n+0.18);
  o.connect(g); g.connect(sfxGain); o.start(n); o.stop(n+0.2);
}

document.getElementById('mute').addEventListener('click', ()=>{
  initAudio();
  muted = !muted;
  if(master) master.gain.setTargetAtTime(muted?0:0.8, AC.currentTime, 0.05);
  document.getElementById('muteIcon').className = muted ? 'ti ti-volume-off' : 'ti ti-volume';
});
document.getElementById('radio').addEventListener('click', switchStation);
document.getElementById('horn').addEventListener('click', honk);

const keys = {};
const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right',e:'action',E:'action',Enter:'action',r:'radio',R:'radio',h:'horn',H:'horn'};
addEventListener('keydown', ev=>{
  const k=map[ev.key]; if(!k) return;
  initAudio();
  if(k==='action'&&!keys[k]) doAction();
  if(k==='radio'&&!keys[k]) switchStation();
  if(k==='horn'&&!keys[k]) honk();
  keys[k]=true; ev.preventDefault();
});
addEventListener('keyup', ev=>{ const k=map[ev.key]; if(k) keys[k]=false; });
cv.addEventListener('pointerdown', initAudio);
document.querySelectorAll('.pad').forEach(b=>{
  const k = b.dataset.k;
  b.addEventListener('pointerdown', ev=>{ ev.preventDefault(); initAudio(); if(k==='action') doAction(); else keys[k]=true; });
  b.addEventListener('pointerup', ()=> keys[k]=false);
  b.addEventListener('pointercancel', ()=> keys[k]=false);
  b.addEventListener('pointerleave', ()=> keys[k]=false);
});

function say(s){ msg = s; msgT = 2.5; }

function doAction(){
  if(p.mode==='foot'){
    if(Math.hypot(p.x-car.x,p.y-car.y)<55){ p.mode='car'; sfxEnter(); say('Driving the car'); }
    else if(Math.hypot(p.x-boat.x,p.y-boat.y)<70){ p.mode='boat'; sfxEnter(); say('Aboard the boat'); }
  } else if(p.mode==='car'){
    car.spd=0; p.mode='foot'; sfxExit();
    p.x=car.x+Math.cos(car.a+1.57)*40; p.y=car.y+Math.sin(car.a+1.57)*40;
    if(terrain(p.x,p.y)==='water'){ p.x=car.x-Math.cos(car.a+1.57)*40; p.y=car.y-Math.sin(car.a+1.57)*40; }
    say('On foot');
  } else if(p.mode==='boat'){
    if(Math.hypot(boat.x-865,boat.y-702)<160){
      boat.spd=0; p.mode='foot'; sfxExit(); p.x=880; p.y=702; say('Stepped onto the pier');
    } else say('Get closer to the pier to disembark');
  }
}

function drive(v, accel, maxF, maxR, turn, drag, allowed){
  if(keys.up) v.spd += accel;
  if(keys.down) v.spd -= accel*0.8;
  v.spd = Math.max(-maxR, Math.min(maxF, v.spd));
  v.spd *= drag;
  const steer = (keys.left?-1:0)+(keys.right?1:0);
  v.a += steer * turn * Math.min(1, Math.abs(v.spd)/1.5) * Math.sign(v.spd||1);
  const nx = v.x + Math.cos(v.a)*v.spd;
  const ny = v.y + Math.sin(v.a)*v.spd;
  if(allowed(terrain(nx,ny)) && nx>20 && nx<WW-20 && ny>20 && ny<WH-20){ v.x=nx; v.y=ny; }
  else { if(Math.abs(v.spd)>1) sfxBump(); v.spd *= -0.3; }
}

function update(){
  t += 0.016;
  if(msgT>0) msgT -= 0.016;
  if(bumpCD>0) bumpCD -= 0.016;
  if(hornCD>0) hornCD -= 0.016;

  if(p.mode==='foot'){
    let dx=(keys.right?1:0)-(keys.left?1:0), dy=(keys.down?1:0)-(keys.up?1:0);
    if(dx||dy){
      const l=Math.hypot(dx,dy); dx/=l; dy/=l;
      p.a = Math.atan2(dy,dx);
      const nx=p.x+dx*2.4, ny=p.y+dy*2.4;
      const tt=terrain(nx,ny);
      if(tt!=='water' && nx>20&&nx<WW-20&&ny>20&&ny<WH-20){ p.x=nx; p.y=ny; }
    }
  } else if(p.mode==='car'){
    const road = onRoad(car.x,car.y);
    drive(car, 0.22, road?7:3.2, 2.5, 0.045, 0.965, tt=> tt==='land'||tt==='beach');
    p.x=car.x; p.y=car.y;
  } else {
    drive(boat, 0.14, 5.5, 1.8, 0.035, 0.985, tt=> tt==='water');
    p.x=boat.x; p.y=boat.y;
  }

  if(AC && engGain){
    let vol=0, freq=60, filt=320;
    if(p.mode==='car'){
      engOsc.type='sawtooth';
      vol = 0.06 + Math.abs(car.spd)*0.012;
      freq = 65 + Math.abs(car.spd)*26;
      filt = 300 + Math.abs(car.spd)*80;
    } else if(p.mode==='boat'){
      engOsc.type='square';
      vol = 0.05 + Math.abs(boat.spd)*0.012;
      freq = 42 + Math.abs(boat.spd)*16;
      filt = 220 + Math.abs(boat.spd)*40;
    }
    engGain.gain.setTargetAtTime(muted?0:vol, AC.currentTime, 0.08);
    engOsc.frequency.setTargetAtTime(freq, AC.currentTime, 0.05);
    engFilter.frequency.setTargetAtTime(filt, AC.currentTime, 0.08);
    const mv = (p.mode==='foot') ? 0.14 : 0.32;
    musicGain.gain.setTargetAtTime(mv, AC.currentTime, 0.4);
  }

  for(const c of coins){
    if(!c.got && Math.hypot(c.x-p.x,c.y-p.y)<30 && p.mode!=='boat'){ c.got=true; score+=5; sfxCoin(); }
  }
  for(const s of stars){
    if(!s.got && Math.hypot(s.x-p.x,s.y-p.y)<38 && p.mode==='boat'){ s.got=true; score+=10; sfxStar(); }
  }
  if(coins.every(c=>c.got) && stars.every(s=>s.got) && msgT<=0) say('All collected! Score '+score+' — free roam forever');
}

function draw(){
  const cx = Math.max(0, Math.min(WW-VW, p.x-VW/2));
  const cy = Math.max(0, Math.min(WH-VH, p.y-VH/2));
  ctx.save();
  ctx.translate(-cx,-cy);

  ctx.fillStyle = '#2E86AB'; ctx.fillRect(0,0,900,WH);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
  for(let y=60; y<WH; y+=90){
    ctx.beginPath();
    for(let x=0;x<=900;x+=20) ctx.lineTo(x, y + Math.sin(x/70 + t*1.5 + y)*6);
    ctx.stroke();
  }
  ctx.fillStyle = '#EFD9A7'; ctx.fillRect(900,0,90,WH);
  ctx.fillStyle = '#8FBF7A'; ctx.fillRect(990,0,WW-990,WH);

  ctx.fillStyle = '#6B6B66';
  ctx.fillRect(1080,150,800,1110);
  ctx.fillStyle = '#8FBF7A';
  ctx.fillRect(1250,330,460,750);
  ctx.strokeStyle = '#F7F3E8'; ctx.lineWidth = 3; ctx.setLineDash([22,18]);
  ctx.strokeRect(1165,240,630,930);
  ctx.setLineDash([]);

  ctx.fillStyle = '#A9743F'; ctx.fillRect(740,670,250,65);
  ctx.strokeStyle = '#7A4E26'; ctx.lineWidth=2;
  for(let x=760;x<990;x+=24){ ctx.beginPath(); ctx.moveTo(x,670); ctx.lineTo(x,735); ctx.stroke(); }

  for(const b of bldgs){
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(b[0]+6,b[1]+6,b[2],b[3]);
    ctx.fillStyle = b[4]; ctx.fillRect(b[0],b[1],b[2],b[3]);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for(let wx=b[0]+14; wx<b[0]+b[2]-14; wx+=30)
      for(let wy=b[1]+14; wy<b[1]+b[3]-14; wy+=30) ctx.fillRect(wx,wy,12,12);
  }
  for(const pl of palms){
    ctx.fillStyle = '#7A4E26'; ctx.beginPath(); ctx.arc(pl[0],pl[1],6,0,7); ctx.fill();
    ctx.fillStyle = '#3B8F5A';
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3 + Math.sin(t+pl[0])*0.08;
      ctx.beginPath(); ctx.ellipse(pl[0]+Math.cos(a)*16, pl[1]+Math.sin(a)*16, 16, 6, a, 0, 7); ctx.fill();
    }
  }

  for(const c of coins){
    if(c.got) continue;
    ctx.fillStyle = '#F9C74F'; ctx.beginPath(); ctx.arc(c.x,c.y,9,0,7); ctx.fill();
    ctx.strokeStyle = '#BA7517'; ctx.lineWidth=2; ctx.stroke();
  }
  for(const s of stars){
    if(s.got) continue;
    const bob = Math.sin(t*2.5+s.ph)*3;
    ctx.save(); ctx.translate(s.x,s.y+bob); ctx.rotate(t*0.8+s.ph);
    ctx.fillStyle = '#F9C74F'; ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=i*2*Math.PI/5-Math.PI/2;
      ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
      const b2=a+Math.PI/5;
      ctx.lineTo(Math.cos(b2)*5.5,Math.sin(b2)*5.5);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  ctx.save(); ctx.translate(boat.x,boat.y); ctx.rotate(boat.a);
  if(p.mode==='boat' && Math.abs(boat.spd)>0.5){
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-30,-8); ctx.lineTo(-60,-16); ctx.moveTo(-30,8); ctx.lineTo(-60,16); ctx.stroke();
  }
  ctx.fillStyle = '#8B4A2B';
  ctx.beginPath(); ctx.moveTo(34,0); ctx.quadraticCurveTo(20,-14,-24,-11);
  ctx.quadraticCurveTo(-32,0,-24,11); ctx.quadraticCurveTo(20,14,34,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#A85C38';
  ctx.beginPath(); ctx.moveTo(24,0); ctx.quadraticCurveTo(14,-8,-18,-6);
  ctx.quadraticCurveTo(-24,0,-18,6); ctx.quadraticCurveTo(14,8,24,0); ctx.closePath(); ctx.fill();
  if(p.mode==='boat'){ ctx.fillStyle='#F4A870'; ctx.beginPath(); ctx.arc(-4,0,5,0,7); ctx.fill(); }
  ctx.restore();

  ctx.save(); ctx.translate(car.x,car.y); ctx.rotate(car.a);
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(-20,-9,42,20);
  ctx.fillStyle = '#D85A30';
  ctx.beginPath(); ctx.roundRect(-22,-11,44,22,6); ctx.fill();
  ctx.fillStyle = '#3A3A38'; ctx.beginPath(); ctx.roundRect(-10,-8,22,16,4); ctx.fill();
  ctx.fillStyle = '#B9D9EA'; ctx.fillRect(8,-7,4,14); ctx.fillRect(-8,-7,3,14);
  ctx.fillStyle = '#FDE9C8'; ctx.fillRect(20,-8,3,4); ctx.fillRect(20,4,3,4);
  ctx.restore();

  if(p.mode==='foot'){
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(0,3,9,6,0,0,7); ctx.fill();
    ctx.fillStyle='#2C5F8A'; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
    ctx.fillStyle='#F4A870'; ctx.beginPath(); ctx.arc(Math.cos(p.a)*3,Math.sin(p.a)*3,4.5,0,7); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  ctx.fillStyle = 'rgba(4,44,83,0.75)';
  ctx.fillRect(10,10,190,72);
  ctx.fillStyle = '#FFFFFF'; ctx.font='500 15px sans-serif';
  ctx.fillText('Score ' + score, 22, 32);
  ctx.font='400 12px sans-serif';
  ctx.fillText(p.mode==='foot'?'On foot':(p.mode==='car'?'In car':'In boat'), 22, 50);
  ctx.fillStyle = '#F9C74F';
  ctx.fillText(stations[stationIdx].name, 22, 70);

  let hint = '';
  if(p.mode==='foot'){
    if(Math.hypot(p.x-car.x,p.y-car.y)<55) hint='Press E — enter car';
    else if(Math.hypot(p.x-boat.x,p.y-boat.y)<70) hint='Press E — board boat';
  } else if(p.mode==='boat' && Math.hypot(boat.x-865,boat.y-702)<160) hint='Press E — dock at pier';
  else if(p.mode==='car') hint = onRoad(car.x,car.y)?'':'Off-road: slower';
  if(msgT>0) hint = msg;
  if(hint){
    ctx.font='500 14px sans-serif';
    const w = ctx.measureText(hint).width+28;
    ctx.fillStyle='rgba(4,44,83,0.8)'; ctx.fillRect(VW/2-w/2, VH-46, w, 30);
    ctx.fillStyle='#FFFFFF'; ctx.textAlign='center';
    ctx.fillText(hint, VW/2, VH-26); ctx.textAlign='left';
  }

  const ms=0.055;
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(VW-WW*ms-14, 10, WW*ms+8, WH*ms+8);
  const mx=VW-WW*ms-10, my=14;
  ctx.fillStyle='#7FB6D0'; ctx.fillRect(mx,my,900*ms,WH*ms);
  ctx.fillStyle='#EFD9A7'; ctx.fillRect(mx+900*ms,my,90*ms,WH*ms);
  ctx.fillStyle='#A8D19A'; ctx.fillRect(mx+990*ms,my,(WW-990)*ms,WH*ms);
  ctx.fillStyle='#6B6B66'; ctx.fillRect(mx+1080*ms,my+150*ms,800*ms,1110*ms);
  ctx.fillStyle='#A8D19A'; ctx.fillRect(mx+1250*ms,my+330*ms,460*ms,750*ms);
  ctx.fillStyle='#E24B4A'; ctx.beginPath(); ctx.arc(mx+p.x*ms,my+p.y*ms,3,0,7); ctx.fill();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
